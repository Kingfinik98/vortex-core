name: VORTEX FRESH BUILD

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Random Secret
        run: |
          echo "GENERATING NEW RANDOM KEY FOR THIS BUILD..."
          KEY=$(tr -dc A-Za-z0-9 </dev/urandom | head -c 32)
          echo "BUILD_SECRET=$KEY" >> $GITHUB_ENV
          
          # Buat File Passkey untuk Artifact
          echo "PASSKEY: $KEY" > app/VORTEX_PASSKEY.txt
          echo "BUILD_DATE: $(date)" >> app/VORTEX_SEPASSED.txt
          
          echo "Key Generated: $KEY"

      # --- TAMBAHAN BARU: PINDAHKAN FILE KE ASSETS (WAJIB UNTUK LOGIN) ---
      - name: Move Passkey to Assets
        run: |
          mkdir -p app/src/main/assets
          cp app/VORTEX_PASSKEY.txt app/src/main/assets/VORTEX_PASSKEY.txt
          echo "Passkey moved to Assets folder for App reading."

      - name: Decode Keystore
        run: echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > app/release.jks

      - name: Setup Gradle and Build
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          BUILD_SECRET: ${{ env.BUILD_SECRET }}
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper
          fi
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK and Passkey
        uses: actions/upload-artifact@v4
        with:
          name: Vortex-Final-Package
          path: |
            app/build/outputs/apk/release/*.apk
            app/VORTEX_SEPASSED.txt
