name: Build Android APK Signed

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode Keystore
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY }}
        run: |
          # Buat file jks di root dan di folder app (jaga-jaga buat semua struktur project)
          echo "$SIGNING_KEY_BASE64" | base64 --decode > release.jks
          # Cek apakah folder app ada, kalau ada copy ke sana juga
          if [ -d "app" ]; then
            echo "$SIGNING_KEY_BASE64" | base64 --decode > app/release.jks
          fi

      - name: Build with Gradle
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # Cari lokasi gradlew secara presisi
          GRADLEW_PATH=$(find . -name "gradlew" -not -path "*/.*" | head -n 1)
          
          if [ -z "$GRADLEW_PATH" ]; then
            echo "KONTOL! File gradlew gak ketemu di folder mana pun. Cek lagi project lu!"
            exit 1
          fi
          
          echo "Ketemu gradlew di: $GRADLEW_PATH"
          chmod +x "$GRADLEW_PATH"
          
          # Jalankan build pake path lengkap yang udah ketemu
          $GRADLEW_PATH assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Production-APK
          path: "**/build/outputs/apk/release/*.apk"
